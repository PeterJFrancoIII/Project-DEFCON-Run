name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Create .env.prod
      run: |
        echo "DEBUG=0" > .env.prod
        echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env.prod
        echo "DJANGO_ALLOWED_HOSTS=${{ secrets.SERVER_IP }} localhost 127.0.0.1" >> .env.prod
        echo "DATABASE=mongodb" >> .env.prod
        echo "DB_NAME=fpv_market" >> .env.prod
        echo "DB_USER=admin" >> .env.prod
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.prod
        echo "DB_HOST=db" >> .env.prod
        echo "DB_PORT=27017" >> .env.prod

    - name: Copy Files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "."
        target: "/root/app"
        # FIXED: Automatically trust the server key
        debug: true 

    - name: Execute Deploy Script
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        # FIXED: Disable host key checking explicitly
        command_timeout: 30m
        script: |
          cd /root/app
          chmod +x deploy.sh
          # Run silently to avoid confusing output, but capture errors
          ./deploy.sh > deploy_log.txt 2>&1 || cat deploy_log.txt
