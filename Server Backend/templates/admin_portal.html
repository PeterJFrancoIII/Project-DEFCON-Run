<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Admin Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .nav-tabs .nav-link { color: #aaa; }
        .nav-tabs .nav-link.active { background-color: #1e1e1e; color: #fff; border-color: #333 #333 #1e1e1e; }
        #map { height: 600px; width: 100%; border-radius: 4px; }
        .btn-approve { background-color: #28a745; color: white; }
        .btn-reject { background-color: #dc3545; color: white; }
        textarea { background-color: #2d2d2d; color: #0f0; font-family: monospace; border: 1px solid #444; width: 100%; height: 400px; }
    </style>
</head>
<body>

<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-3 text-danger"><i class="bi bi-shield-lock"></i> SENTINEL COMMAND :: ADMIN PORTAL</h2>
            
            <ul class="nav nav-tabs" id="myTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="zones-tab" data-bs-toggle="tab" data-bs-target="#zones" type="button">Exclusion Zones (Map)</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="approval-tab" data-bs-toggle="tab" data-bs-target="#approvals" type="button">Approvals (HITL)</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="config-tab" data-bs-toggle="tab" data-bs-target="#config" type="button">Configuration</button>
                </li>
            </ul>
            
            <div class="tab-content p-3 border border-top-0 card" id="myTabContent">
                
                <!-- ZONES MAP TAB -->
                <div class="tab-pane fade show active" id="zones" role="tabpanel">
                    <div class="row">
                        <div class="col-md-9">
                            <div id="map"></div>
                        </div>
                        <div class="col-md-3">
                            <h5>Zone Controls</h5>
                            <button class="btn btn-primary w-100 mb-2" onclick="saveZones()">💾 Save Changes to CSV</button>
                            <button class="btn btn-secondary w-100 mb-2" onclick="loadZones()">🔄 Reload from CSV</button>
                            <hr>
                            <div id="zone-list" style="max-height: 500px; overflow-y: auto;">
                                <!-- Zone items will go here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- APPROVALS TAB -->
                <div class="tab-pane fade" id="approvals" role="tabpanel">
                   <h5>Pending DEFCON 1 Alerts</h5>
                   <button class="btn btn-sm btn-secondary" onclick="loadApprovals()">Refresh</button>
                   <table class="table table-dark table-striped mt-2">
                       <thead>
                           <tr>
                               <th>Zip Code</th>
                               <th>Location</th>
                               <th>Current Status</th>
                               <th>Summary</th>
                               <th>Actions</th>
                           </tr>
                       </thead>
                       <tbody id="approval-table">
                           <!-- JS populated -->
                       </tbody>
                   </table>
                </div>

                <!-- CONFIG TAB -->
                <div class="tab-pane fade" id="config" role="tabpanel">
                    <h5>API Config (api_config.py)</h5>
                    <button class="btn btn-primary mb-2" onclick="saveConfig()">Save Config</button>
                    <textarea id="config-editor"></textarea>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // --- GLOBAL VARS ---
    let map, drawnItems;
    let zones = [];

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        loadZones();
        loadApprovals();
        loadConfig();
    });

    // --- MAP LOGIC ---
    function initMap() {
        map = L.map('map').setView([13.7563, 100.5018], 10); // Bangkok Center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Sentinel Command | OpenStreetMap'
        }).addTo(map);

        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: false,
                marker: false,
                polyline: false,
                circlemarker: false,
                // Allow Circle and Rectangle
                circle: true,
                rectangle: true
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (e) {
            const layer = e.layer;
            drawnItems.addLayer(layer);
            // Logic to add to internal zones array? 
            // Better: Just let user draw, then we parse layers on Save.
        });
    }

    async function loadZones() {
        const res = await fetch('/api/admin/zones');
        const data = await res.json();
        zones = data.zones || [];
        
        drawnItems.clearLayers();
        const zoneList = document.getElementById('zone-list');
        zoneList.innerHTML = '';

        zones.forEach((z, idx) => {
            let layer;
            const popup = `<b>${z.zone_name}</b><br>${z.notes}`;
            
            // Add to Sidebar
            zoneList.innerHTML += `<div class="card p-2 mb-1"><small><b>${z.zone_name}</b> (${z.shape_type})</small></div>`;

            if (z.shape_type === 'RECTANGLE') {
                const bounds = [[z.bound_nw_lat, z.bound_nw_lng], [z.bound_se_lat, z.bound_se_lng]];
                layer = L.rectangle(bounds, {color: "#ff0000", weight: 1});
            } else if (z.shape_type === 'CIRCLE') {
                layer = L.circle([z.lat_center, z.lng_center], {
                    radius: z.radius_km * 1000, 
                    color: "#ff0000", weight: 1
                });
            }
            
            if(layer) {
                layer.bindPopup(popup);
                drawnItems.addLayer(layer);
                // attach data for save
                layer.sentinelData = z; 
            }
        });
    }

    async function saveZones() {
        const newZones = [];
        drawnItems.eachLayer(layer => {
            let z = {
                zone_name: "New Zone",
                risk_level: "HIGH",
                notes: "Created via Admin Portal"
            };
            
            // Preserve existing metadata if edited
            if (layer.sentinelData) {
                z = {...layer.sentinelData};
            }

            if (layer instanceof L.Rectangle) {
                z.shape_type = 'RECTANGLE';
                const bounds = layer.getBounds();
                z.bound_nw_lat = bounds.getNorthWest().lat.toFixed(4);
                z.bound_nw_lng = bounds.getNorthWest().lng.toFixed(4);
                z.bound_se_lat = bounds.getSouthEast().lat.toFixed(4);
                z.bound_se_lng = bounds.getSouthEast().lng.toFixed(4);
                // Center for ref
                const center = bounds.getCenter();
                z.lat_center = center.lat.toFixed(4);
                z.lng_center = center.lng.toFixed(4);
                z.radius_km = 0;
            } else if (layer instanceof L.Circle) {
                z.shape_type = 'CIRCLE';
                const latlng = layer.getLatLng();
                z.lat_center = latlng.lat.toFixed(4);
                z.lng_center = latlng.lng.toFixed(4);
                z.radius_km = (layer.getRadius() / 1000).toFixed(2);
            }
            newZones.push(z);
        });

        const res = await fetch('/api/admin/zones/save', {
            method: 'POST',
            body: JSON.stringify({zones: newZones})
        });
        const ans = await res.json();
        alert(ans.message || ans.error);
    }

    // --- APPROVAL LOGIC ---
    async function loadApprovals() {
        const res = await fetch('/api/admin/approvals');
        const data = await res.json();
        const tbody = document.getElementById('approval-table');
        tbody.innerHTML = '';
        
        data.pending.forEach(doc => {
            const en = doc.languages.en;
            tbody.innerHTML += `
                <tr>
                    <td>${doc.zip_code}</td>
                    <td>${en.location_name}</td>
                    <td>DETECTION (Pending)</td>
                    <td><small>${en.summary[0]}</small></td>
                    <td>
                        <button class="btn btn-sm btn-approve" onclick="decide('${doc.zip_code}', 'APPROVE')">Approve</button>
                        <button class="btn btn-sm btn-reject" onclick="decide('${doc.zip_code}', 'REJECT')">Reject</button>
                    </td>
                </tr>
            `;
        });
        if(data.pending.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No pending alerts.</td></tr>';
        }
    }

    async function decide(zip, action) {
        if(!confirm(`Confirm ${action} for ${zip}?`)) return;
        
        const res = await fetch('/api/admin/approvals/decide', {
            method: 'POST',
            body: JSON.stringify({zip_code: zip, action: action})
        });
        loadApprovals();
    }

    // --- CONFIG LOGIC ---
    async function loadConfig() {
        const res = await fetch('/api/admin/config');
        const data = await res.json();
        document.getElementById('config-editor').value = data.content;
    }
    
    async function saveConfig() {
        const content = document.getElementById('config-editor').value;
        await fetch('/api/admin/config/save', {
             method: 'POST',
             body: JSON.stringify({content: content})
        });
        alert("Configuration saved.");
    }

</script>
</body>
</html>
